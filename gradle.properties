# NOTE: The platformVersion value MUST be identical to the one in the cplex-opl-jetbrains repo.
# Check the plugin's build.gradle.kts to see which IntelliJ Platform version is used there,
# and paste the exact same one here (PHASE 0 / PHASE 5 in PLAN.md).
platformVersion=2025.2.6.1

# The exact tag name of the latest plugin release on GitHub,
# used by the fetchPlugin task to download the .zip file.
# Example: v1.4.2 (check the Releases tab in the cplex-opl-jetbrains repo)
pluginVersion=1.4.6

org.gradle.jvmargs=-Xmx2g
kotlin.stdlib.default.dependency=false
