name: Plugin regression tests

on:
  # Automatic trigger from the cplex-opl-jetbrains repo after each release (PHASE 4 in PLAN.md)
  repository_dispatch:
    types: [plugin_released]

  # Manual trigger from the Actions tab - use this for initial tests
  workflow_dispatch:
    inputs:
      pluginVersion:
        description: "Tag release'u pluginu do przetestowania (opcjonalnie, nadpisuje gradle.properties)"
        required: false
        type: string

jobs:
  regression-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Override variables dynamically (z triggera webhook / wpisane ręcznie)
        env:
          INPUT_VERSION: ${{ inputs.pluginVersion }}
          PAYLOAD_VERSION: ${{ github.event.client_payload.version }}
          PAYLOAD_PLATFORM: ${{ github.event.client_payload.platform_version }}
        run: |
          # 1. Wersja wtyczki (pluginVersion)
          VERSION="${INPUT_VERSION:-$PAYLOAD_VERSION}"
          if [ -n "$VERSION" ]; then
            VERSION=${VERSION#v}
            echo "pluginVersion=${VERSION}" >> gradle.properties
          fi
          
          # 2. Wersja IntelliJ (platformVersion)
          PLATFORM="$PAYLOAD_PLATFORM"
          if [ -n "$PLATFORM" ]; then
            echo "platformVersion=${PLATFORM}" >> gradle.properties
          fi

      - name: Download Plugin
        run: |
          chmod +x gradlew
          ./gradlew :test-harness:fetchPlugin --stacktrace

      - name: Run regression tests
        run: ./gradlew :test-harness:test --stacktrace

      - name: Upload JSON report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plugin-regression-report
          path: test-harness/build/test-results/plugin-report.json
          retention-days: 30

      - name: Upload full test logs (na wypadek fail)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-test-logs
          path: test-harness/build/reports/tests/
          retention-days: 14

      - name: Generate summary report
        if: always()
        run: |
          chmod +x scripts/generate_github_summary.sh
          ./scripts/generate_github_summary.sh
